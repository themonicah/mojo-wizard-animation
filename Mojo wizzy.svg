<style>
  @keyframes leftArmBob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-4px) rotate(3deg); }
  }
  @keyframes rightArmBob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-4px) rotate(-3deg); }
  }
  @keyframes hatBob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-5px) rotate(3deg); }
  }
  .left-arm {
    transform-box: view-box;
    transform-origin: 89px 123px;
    animation: leftArmBob 3.5s ease-in-out infinite;
  }
  .right-arm {
    transform-box: view-box;
    transform-origin: 232px 179px;
    animation: rightArmBob 3.5s ease-in-out infinite;
  }
  .hat {
    transform-box: view-box;
    transform-origin: 190px 90px;
    animation: hatBob 3.5s ease-in-out infinite;
  }
</style>
