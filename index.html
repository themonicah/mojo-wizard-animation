<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mojo Wizard Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 24px 0 16px;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: #f0f0f0;
      color: #666;
      transition: all 0.2s;
    }

    .tab:hover {
      background: #e0e0e0;
    }

    .tab.active {
      background: #7D40FF;
      color: #fff;
    }

    .tab.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .tab.disabled:hover {
      background: #f0f0f0;
    }

    /* Animation tile */
    .tile {
      background: #f5f5f5;
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      position: relative;
      width: 650px;
      height: 650px;
      background: #ffffff;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene::before {
      content: '';
      position: absolute;
      width: 220px;
      height: 36px;
      left: 50%;
      bottom: 112px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(40, 26, 94, 0.18) 0%, rgba(40, 26, 94, 0.08) 45%, rgba(40, 26, 94, 0) 75%);
      filter: blur(6px);
      animation: wizardShadow 4.8s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    .wizard {
      width: 364px;
      margin-top: 120px;
      margin-left: 40px;
      z-index: 1;
      position: relative;
      pointer-events: none;
      filter: drop-shadow(0 14px 18px rgba(46, 31, 110, 0.12));
    }

    /* Icons in a tight rainbow arc */
    .icon {
      position: absolute;
      width: 85px;
      height: 85px;
      z-index: 15;
      cursor: pointer;
      perspective: 400px;
      will-change: transform;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-style: preserve-3d;
      transform-origin: center;
      will-change: transform;
      transform: translate3d(0px, 0px, 0px) rotateX(10deg) rotateY(-12deg) rotateZ(0deg);
      transition: transform 0.3s ease;
    }

    .icon:hover img {
      transform: translate3d(0px, -2px, 0px) rotateX(14deg) rotateY(-16deg) rotateZ(-3deg);
    }

    .icon.flung img {
      pointer-events: none;
    }

    .icon::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: #333;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .icon:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* Icons along tight overlapping arc */
    .icon-1 {
      top: 33%;
      left: 15%;
      z-index: 5;
      animation: orbit1 5.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .icon-2 {
      top: 25%;
      left: 26%;
      z-index: 6;
      animation: orbit2 4.6s cubic-bezier(0.33, 0, 0.2, 1) infinite;
    }
    .icon-3 {
      top: 19%;
      left: 38%;
      z-index: 7;
      animation: orbit3 5.8s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }
    .icon-4 {
      top: 17%;
      left: 50%;
      z-index: 8;
      animation: orbit4 4.9s cubic-bezier(0.38, 0, 0.2, 1) infinite;
    }
    .icon-5 {
      top: 22%;
      left: 62%;
      z-index: 7;
      animation: orbit5 5.5s cubic-bezier(0.42, 0, 0.2, 1) infinite;
    }
    .icon-6 {
      top: 31%;
      left: 71%;
      z-index: 6;
      animation: orbit6 4.8s cubic-bezier(0.35, 0, 0.2, 1) infinite;
    }

    /* Arc above wizard, animated with transforms for smoother motion */
    @keyframes orbit1 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -8px, 0px) rotate(10deg); }
    }
    @keyframes orbit2 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -9px, 0px) rotate(-12deg); }
    }
    @keyframes orbit3 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -7px, 0px) rotate(9deg); }
    }
    @keyframes orbit4 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -10px, 0px) rotate(-8deg); }
    }
    @keyframes orbit5 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -8px, 0px) rotate(10deg); }
    }
    @keyframes orbit6 {
      0%, 100% { transform: translate3d(0px, 0px, 0px) rotate(0deg); }
      50%      { transform: translate3d(0px, -9px, 0px) rotate(-11deg); }
    }

    /* Twinkling stars */
    .star {
      position: absolute;
      z-index: 4;
      pointer-events: none;
    }
    .star img {
      width: 100%;
      height: 100%;
    }
    @keyframes twinkle1 {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      15%      { opacity: 1; transform: scale(1); }
      30%      { opacity: 0; transform: scale(0.4); }
    }
    @keyframes twinkle2 {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      12%      { opacity: 1; transform: scale(1.1); }
      25%      { opacity: 0; transform: scale(0.3); }
    }
    @keyframes twinkle3 {
      0%, 100% { opacity: 0; transform: scale(0.3); }
      18%      { opacity: 0.9; transform: scale(1.2); }
      35%      { opacity: 0; transform: scale(0.4); }
    }

    @keyframes wizardShadow {
      0%, 100% {
        transform: translateX(-50%) scaleX(1) scaleY(1);
        opacity: 0.24;
      }
      50% {
        transform: translateX(-50%) scaleX(0.97) scaleY(0.96);
        opacity: 0.22;
      }
    }

    /* Scene switching */
    .scene { display: none; }
    .scene.active { display: flex; }

    /* Privacy scene */
    .privacy-scene {
      position: relative;
      width: 650px;
      height: 650px;
      background: #ffffff;
      border-radius: 20px;
      display: none;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .privacy-scene.active { display: flex; }

    .lock-container {
      position: relative;
      width: 340px;
      animation: lockFloat 4s ease-in-out infinite;
    }


    @keyframes lockFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }


    .lock-base {
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Golden glow behind lock */
    .lock-glow {
      position: absolute;
      top: 20%;
      left: 15%;
      width: 70%;
      height: 50%;
      background: radial-gradient(circle, rgba(255, 224, 31, 0.25) 0%, rgba(255, 224, 31, 0) 70%);
      z-index: 0;
      pointer-events: none;
      filter: blur(20px);
      transition: opacity 0.4s ease;
    }

    .lock-glow {
      transition: opacity 0.8s ease;
      opacity: 0.6;
    }


    .lock-face {
      position: absolute;
      top: 26.5%;
      left: 27%;
      width: 62%;
      z-index: 2;
    }

    .lock-keyhole {
      position: absolute;
      top: 37%;
      left: 44%;
      width: 17%;
      z-index: 4;
    }

    .lock-shine {
      position: absolute;
      top: 26.5%;
      left: 27%;
      width: 62%;
      height: 38%;
      z-index: 3;
      overflow: hidden;
      border-radius: 12px;
      pointer-events: none;
    }

    .lock-shine-beam {
      position: absolute;
      top: -20%;
      left: -40%;
      width: 35%;
      height: 140%;
      background: rgba(255, 224, 50, 0.45);
      transform: skewX(-15deg);
      animation: lockShineSwipe 4s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes lockShineSwipe {
      0%   { left: -40%; opacity: 0; }
      10%  { opacity: 0.8; }
      50%  { left: 120%; opacity: 0.8; }
      60%  { opacity: 0; }
      100% { left: 120%; opacity: 0; }
    }

    .lock-sparkle-zone {
      position: absolute;
      top: 15%;
      left: 24%;
      width: 65%;
      height: 52%;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }

    .lock-sparkle {
      position: absolute;
      pointer-events: none;
      opacity: 0;
    }
    .lock-sparkle img {
      width: 100%;
      height: 100%;
    }

    .bg-sparkle-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    @keyframes lockSparkle {
      0%       { opacity: 0; transform: scale(0.2) rotate(0deg); }
      20%      { opacity: 1; transform: scale(1) rotate(15deg); }
      40%      { opacity: 0; transform: scale(0.3) rotate(30deg); }
      100%     { opacity: 0; transform: scale(0.3) rotate(30deg); }
    }

    /* Friends Card scene */
    .friends-card-scene {
      position: relative;
      width: 900px;
      background: #ffffff;
      border-radius: 20px;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 50px 40px;
      gap: 0;
    }
    .friends-card-scene.active { display: flex; }

    .cards-row {
      display: flex;
      gap: 24px;
      width: 100%;
    }

    .product-card-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .card-visual {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      border-radius: inherit;
    }
    .card-sparks { background: #7DD3FC; }
    .card-sparks-wrap .product-card {
      overflow: visible;
    }
    .card-tutor { background: #34D399; }
    .card-islands { background: #FFD633; }

    /* Character/logo positioning */
    .card-char, .card-logo {
      position: absolute;
      pointer-events: none;
    }
    .card-char {
      transition: transform 0.4s ease;
    }

    /* Character hover */
    .product-card:hover .card-char-sparky {
      transform: translateX(-50%) translateY(-6px) rotate(-2deg);
    }
    .product-card:hover .card-char-nova {
      transform: translateY(-8px) rotate(3deg);
    }
    .product-card:hover .card-char-bandit {
      transform: translateY(-6px) rotate(2deg);
    }

    /* Sparks C-A-T letter hover */
    .product-card:hover .card-letter-c {
      opacity: 1;
      transform: translate(0, 0) scale(1) rotate(-8deg);
    }
    .product-card:hover .card-letter-a {
      opacity: 1;
      transform: translate(0, 0) scale(1) rotate(6deg);
    }
    .product-card:hover .card-letter-t {
      opacity: 1;
      transform: translate(0, 0) scale(1) rotate(-5deg);
    }

    .card-logo-sparks {
      width: 75%;
      top: 8%;
      left: 12%;
      z-index: 2;
    }
    .card-char-sparky {
      width: 65%;
      bottom: -5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }
    /* C-A-T letters - start hidden behind logo */
    .card-letter-c, .card-letter-a, .card-letter-t {
      z-index: 3;
      opacity: 0;
    }
    .card-letter-c {
      width: 26%;
      top: 22%;
      left: 2%;
      transform: translate(50px, -10px) scale(0.3);
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .card-letter-a {
      width: 28%;
      top: -8%;
      left: 28%;
      transform: translate(10px, 40px) scale(0.3);
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.06s, opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) 0.06s;
    }
    .card-letter-t {
      width: 22%;
      top: 2%;
      right: 2%;
      transform: translate(-40px, 30px) scale(0.3);
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) 0.12s, opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) 0.12s;
    }

    .card-logo-tutor {
      width: 70%;
      top: 8%;
      left: 15%;
    }
    .card-char-nova {
      width: 70%;
      bottom: -8%;
      left: 15%;
      z-index: 2;
    }

    .card-logo-islands {
      width: 65%;
      top: 8%;
      left: 18%;
      z-index: 2;
    }
    .card-char-bandit {
      width: 95%;
      bottom: -12%;
      left: -8%;
      z-index: 1;
    }

    .card-text {
      padding: 14px 8px 0;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      color: #555;
    }

    /* Tutor math particles */
    .math-particle {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      font-weight: 700;
      font-size: 16px;
      opacity: 0;
      animation: mathFly 2.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes mathFly {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.4) rotate(0deg); }
      10%  { opacity: 1; transform: translate(calc(var(--mx) * 0.3), calc(var(--my) * 0.3)) scale(0.9) rotate(calc(var(--mr) * 0.2)); }
      40%  { opacity: 1; transform: translate(calc(var(--mx) * 1.2), calc(var(--my) * 1.2)) scale(1) rotate(calc(var(--mr) * 0.6)); }
      70%  { opacity: 0.6; transform: translate(calc(var(--mx) * 2.5), calc(var(--my) * 2.5)) scale(0.7) rotate(var(--mr)); }
      100% { opacity: 0; transform: translate(calc(var(--mx) * 3.5), calc(var(--my) * 3.5)) scale(0.3) rotate(calc(var(--mr) * 1.3)); }
    }

    /* Fling star particles */
    .fling-star {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      animation: flingStarBurst 0.7s ease-out forwards;
    }
    @keyframes flingStarBurst {
      0%   { opacity: 1; transform: scale(1) translate(0, 0); }
      100% { opacity: 0; transform: scale(0.3) translate(var(--tx), var(--ty)); }
    }

  </style>
</head>
<body>
  <nav class="tabs">
    <button class="tab disabled" disabled>1. Hero</button>
    <button class="tab" data-scene="friends-card">2. Friends Card</button>
    <button class="tab" data-scene="privacy">3. Privacy</button>
    <button class="tab disabled" disabled>4. SL Hero</button>
    <button class="tab disabled" disabled>5. QR Friends</button>
    <button class="tab disabled" disabled>6. Bento Card</button>
    <button class="tab disabled" disabled>7. Friends</button>
    <button class="tab active" data-scene="toolkit">8. Toolkit</button>
    <button class="tab disabled" disabled>9. Routing Cards</button>
  </nav>

  <div class="tile">
    <div class="scene active" data-scene="toolkit">
      <img class="wizard" src="Mojo wizzy.svg" alt="Mojo Wizard">

      <!-- Order: blue chat, orange shuffle, purple megaphone, green timer, red people, orange music -->
      <div class="icon icon-1" data-tooltip="Think Pair Share"><img src="icon 1.svg" alt="Think Pair Share"></div>
      <div class="icon icon-2" data-tooltip="Shuffle"><img src="icon 2.svg" alt="Shuffle"></div>
      <div class="icon icon-3" data-tooltip="Noise Meter"><img src="icon 3.svg" alt="Noise Meter"></div>
      <div class="icon icon-4" data-tooltip="Timer"><img src="icon 4.svg" alt="Timer"></div>
      <div class="icon icon-5" data-tooltip="Group Maker"><img src="icon 5.svg" alt="Group Maker"></div>
      <div class="icon icon-6" data-tooltip="Music"><img src="Group.svg" alt="Music"></div>

      <!-- Twinkling stars -->
      <div class="star star-1"><img src="star 1.svg" alt=""></div>
      <div class="star star-2"><img src="star 1.svg" alt=""></div>
      <div class="star star-3"><img src="star 1.svg" alt=""></div>
    </div>
    <!-- Friends Card Scene -->
    <div class="friends-card-scene" data-scene="friends-card">
      <div class="cards-row">
        <div class="product-card-wrap card-sparks-wrap">
          <div class="product-card">
            <div class="card-visual card-sparks">
              <img src="friends-card/sparky.svg" class="card-char card-char-sparky" alt="Sparky">
              <img src="friends-card/Group 1171275547.svg" class="card-logo card-logo-sparks" alt="Dojo Sparks">
            </div>
            <img src="friends-card/letter.svg" class="card-char card-letter-c" alt="C">
            <img src="friends-card/letter a.svg" class="card-char card-letter-a" alt="A">
            <img src="friends-card/monster.svg" class="card-char card-letter-t" alt="T">
          </div>
          <div class="card-text">Social-emotional learning videos that help kids develop important life skills.</div>
        </div>
        <div class="product-card-wrap">
          <div class="product-card">
            <div class="card-visual card-tutor">
              <img src="friends-card/nova.svg" class="card-char card-char-nova" alt="Nova">
              <img src="friends-card/tutor.svg" class="card-logo card-logo-tutor" alt="Dojo Tutor">
            </div>
          </div>
          <div class="card-text">Personalized tutoring that helps students who need extra support.</div>
        </div>
        <div class="product-card-wrap">
          <div class="product-card">
            <div class="card-visual card-islands">
              <img src="friends-card/islands.svg" class="card-logo card-logo-islands" alt="Dojo Islands">
              <img src="friends-card/bandit.svg" class="card-char card-char-bandit" alt="Bandit">
            </div>
          </div>
          <div class="card-text">Educational games that make learning fun for kids of all ages.</div>
        </div>
      </div>
    </div>

    <!-- Privacy Scene -->
    <div class="privacy-scene" data-scene="privacy">
      <div class="lock-container">
        <div class="lock-glow"></div>
        <img class="lock-base" src="Group 1171275553.svg" alt="Lock">
        <img class="lock-face" src="front face lock.svg" alt="Lock Face">
        <div class="lock-shine">
          <div class="lock-shine-beam"></div>
        </div>
        <img class="lock-keyhole" src="lock front.svg" alt="Keyhole">
      </div>

      <div class="lock-sparkle-zone" id="lockSparkleZone"></div>
      <div class="bg-sparkle-zone" id="bgSparkleZone"></div>
    </div>
  </div>
  <script>
    function scatterStars() {
      const patterns = ['twinkle1', 'twinkle2', 'twinkle3'];

      document.querySelectorAll('.star').forEach((star, index) => {
        const size = 10 + Math.random() * 10;
        const left = 8 + Math.random() * 78;
        const top = 8 + Math.random() * 54;
        const duration = 4.2 + Math.random() * 2.2;
        const delay = Math.random() * 3;

        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = left + '%';
        star.style.top = top + '%';
        star.style.animation = `${patterns[index % patterns.length]} ${duration}s ease-in-out infinite ${delay}s`;
      });
    }

    function sprayStars(x, y, angle, count) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('img');
        star.src = 'star 1.svg';
        star.className = 'fling-star';
        const size = 8 + Math.random() * 14;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = x + 'px';
        star.style.top = y + 'px';
        // Spread in a cone around the fling direction
        const spread = (Math.random() - 0.5) * 1.8;
        const dist = 40 + Math.random() * 80;
        const tx = Math.cos(angle + spread) * dist;
        const ty = Math.sin(angle + spread) * dist;
        star.style.setProperty('--tx', tx + 'px');
        star.style.setProperty('--ty', ty + 'px');
        star.style.animationDelay = (Math.random() * 0.15) + 's';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 900);
      }
    }

    document.querySelectorAll('.icon').forEach(icon => {
      let isDragging = false;
      let prevX, prevY, velX = 0, velY = 0;
      let offsetX = 0, offsetY = 0;
      let animFrame;

      const onDown = (e) => {
        e.preventDefault();
        isDragging = true;
        const pt = e.touches ? e.touches[0] : e;
        prevX = pt.clientX;
        prevY = pt.clientY;
        velX = 0;
        velY = 0;
        offsetX = 0;
        offsetY = 0;
        const img = icon.querySelector('img');
        img.style.transition = 'none';
        img.style.transform = 'translate3d(0px, 0px, 0px) rotateX(10deg) rotateY(-12deg) rotateZ(0deg)';
      };

      const onMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        const dx = pt.clientX - prevX;
        const dy = pt.clientY - prevY;
        // Smooth velocity with momentum
        velX = velX * 0.5 + dx * 0.5;
        velY = velY * 0.5 + dy * 0.5;
        offsetX += dx;
        offsetY += dy;
        prevX = pt.clientX;
        prevY = pt.clientY;
        icon.querySelector('img').style.transform =
          `translate3d(${offsetX}px, ${offsetY}px, 0px) rotateX(10deg) rotateY(-12deg) rotateZ(${offsetX * 0.15}deg)`;
      };

      const onUp = () => {
        if (!isDragging) return;
        isDragging = false;
        const img = icon.querySelector('img');

        // Fling in the velocity direction
        const speed = Math.sqrt(velX * velX + velY * velY);
        const flingScale = Math.min(speed * 4.5, 90);
        const angle = Math.atan2(velY, velX);
        const flingX = offsetX + Math.cos(angle) * flingScale;
        const flingY = offsetY + Math.sin(angle) * flingScale;

        // Spray magic stars from the icon's center
        const rect = icon.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        sprayStars(cx, cy, angle, 5 + Math.floor(Math.random() * 4));

        // Phase 1: fling outward
        img.style.transition = 'transform 0.35s cubic-bezier(0.2, 0, 0.4, 1)';
        img.style.transform =
          `translate3d(${flingX}px, ${flingY}px, 0px) rotateX(10deg) rotateY(-12deg) rotateZ(${flingX * 0.2}deg)`;

        // Phase 2: boomerang back with smooth arc
        setTimeout(() => {
          img.style.transition = 'transform 1s cubic-bezier(0.25, 0.8, 0.25, 1)';
          img.style.transform = 'translate3d(0px, 0px, 0px) rotateX(10deg) rotateY(-12deg) rotateZ(0deg)';
        }, 350);

        // Clean up
        setTimeout(() => {
          img.style.transition = '';
          img.style.transform = '';
        }, 1400);
      };

      icon.addEventListener('mousedown', onDown);
      icon.addEventListener('touchstart', onDown, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
    });

    scatterStars();

    // White stars on the lock face
    function spawnLockSparkle() {
      const zone = document.getElementById('lockSparkleZone');
      if (!zone || !zone.closest('.privacy-scene.active')) return;
      const sparkle = document.createElement('div');
      sparkle.className = 'lock-sparkle';
      const size = 20 + Math.random() * 30;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      sparkle.style.left = (Math.random() * 80 + 5) + '%';
      sparkle.style.top = (Math.random() * 80 + 5) + '%';
      sparkle.style.animation = 'lockSparkle 1.5s ease-in-out forwards';
      sparkle.innerHTML = '<img src="star white.svg" alt="">';
      zone.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 1600);
    }

    // Gray stars on the white background
    function spawnBgSparkle() {
      const zone = document.getElementById('bgSparkleZone');
      if (!zone || !zone.closest('.privacy-scene.active')) return;
      const sparkle = document.createElement('div');
      sparkle.className = 'lock-sparkle';
      const size = 30 + Math.random() * 40;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      // Avoid the center where the lock is
      const side = Math.random() > 0.5;
      sparkle.style.left = side ? (Math.random() * 20 + 2) + '%' : (Math.random() * 20 + 75) + '%';
      sparkle.style.top = (Math.random() * 70 + 10) + '%';
      sparkle.style.animation = 'lockSparkle 2s ease-in-out forwards';
      sparkle.innerHTML = '<img src="Vector.svg" alt="">';
      zone.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 2100);
    }

    setInterval(spawnLockSparkle, 800);
    setInterval(spawnBgSparkle, 1200);



    // Tutor card - math particles from Nova's fist on hover
    const tutorCard = document.querySelectorAll('.product-card')[1];
    if (tutorCard) {
      const mathSymbols = ['A', 'B', 'C', 'x', 'y', 'z', '1', '2', '3', '7', '+', '=', '×', '÷', 'π', '∑', '%', '?', '!', '&', '√', 'abc', '42', '∞', '#', 'n²', '±', '∆', 'λ'];
      const mathColors = ['#2D6A4F', '#1B4332', '#40916C', '#52B788', '#fff', '#D8F3DC'];
      let mathInterval = null;

      function spawnMathParticle() {
        const visual = tutorCard.querySelector('.card-visual');
        if (!visual) return;
        const particle = document.createElement('span');
        particle.className = 'math-particle';
        particle.textContent = mathSymbols[Math.floor(Math.random() * mathSymbols.length)];
        particle.style.color = mathColors[Math.floor(Math.random() * mathColors.length)];
        particle.style.fontSize = (12 + Math.random() * 14) + 'px';
        // Spawn from behind Nova's raised fingers
        particle.style.left = '18%';
        particle.style.top = '33%';
        // Radiate outward from fist in all directions
        const angle = -Math.PI + Math.random() * Math.PI * 2;
        const dist = 35 + Math.random() * 50;
        particle.style.setProperty('--mx', Math.cos(angle) * dist + 'px');
        particle.style.setProperty('--my', Math.sin(angle) * dist + 'px');
        particle.style.setProperty('--mr', (-30 + Math.random() * 60) + 'deg');
        visual.appendChild(particle);
        setTimeout(() => particle.remove(), 2200);
      }

      tutorCard.addEventListener('mouseenter', () => {
        for (let i = 0; i < 3; i++) setTimeout(() => spawnMathParticle(), i * 150);
        mathInterval = setInterval(spawnMathParticle, 600);
      });
      tutorCard.addEventListener('mouseleave', () => {
        clearInterval(mathInterval);
        mathInterval = null;
      });
    }

    // Tab switching
    document.querySelectorAll('.tab[data-scene]').forEach(tab => {
      tab.addEventListener('click', () => {
        const sceneName = tab.dataset.scene;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('[data-scene]').forEach(s => {
          if (s.tagName !== 'BUTTON') s.classList.remove('active');
        });
        const target = document.querySelector(`.tile [data-scene="${sceneName}"]`);
        if (target) target.classList.add('active');
      });
    });

  </script>
</body>
</html>
